<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Weather Dashboard</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', sans-serif;
      min-height: 100vh;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 30px 20px;
      color: #fff;
    }

    h1 {
      font-size: 2rem;
      font-weight: 700;
      margin-bottom: 8px;
      letter-spacing: 1px;
    }

    .subtitle { color: #94a3b8; margin-bottom: 30px; font-size: 0.9rem; }

    /* Search */
    .search-bar {
      display: flex;
      gap: 10px;
      margin-bottom: 30px;
      width: 100%;
      max-width: 500px;
    }

    .search-bar input {
      flex: 1;
      padding: 14px 20px;
      border-radius: 50px;
      border: 2px solid rgba(255,255,255,0.15);
      background: rgba(255,255,255,0.08);
      color: #fff;
      font-size: 1rem;
      outline: none;
      transition: border 0.3s;
    }

    .search-bar input::placeholder { color: #94a3b8; }
    .search-bar input:focus { border-color: #60a5fa; }

    .search-bar button {
      padding: 14px 24px;
      border-radius: 50px;
      border: none;
      background: linear-gradient(135deg, #3b82f6, #2563eb);
      color: #fff;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.2s, opacity 0.2s;
    }

    .search-bar button:hover { transform: scale(1.05); opacity: 0.9; }

    /* Error */
    .error {
      background: rgba(239,68,68,0.15);
      border: 1px solid rgba(239,68,68,0.4);
      color: #fca5a5;
      padding: 12px 24px;
      border-radius: 12px;
      margin-bottom: 20px;
      display: none;
    }

    /* Main Card */
    .card {
      background: rgba(255,255,255,0.07);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 24px;
      padding: 36px;
      width: 100%;
      max-width: 500px;
      display: none;
      animation: fadeIn 0.4s ease;
    }

    @keyframes fadeIn { from { opacity:0; transform:translateY(20px); } to { opacity:1; transform:none; } }

    .city-row {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 20px;
    }

    .city-name { font-size: 1.8rem; font-weight: 700; }
    .city-country { color: #94a3b8; font-size: 0.95rem; margin-top: 4px; }
    .city-date { color: #94a3b8; font-size: 0.85rem; text-align: right; }

    .temp-row {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-bottom: 10px;
    }

    .weather-icon { font-size: 5rem; line-height: 1; }
    .temperature { font-size: 4.5rem; font-weight: 800; }
    .temp-unit { font-size: 1.5rem; color: #94a3b8; align-self: flex-start; margin-top: 12px; }

    .description {
      text-transform: capitalize;
      color: #cbd5e1;
      font-size: 1.1rem;
      margin-bottom: 28px;
    }

    .feels-like { color: #94a3b8; font-size: 0.85rem; margin-top: -22px; margin-bottom: 24px; }

    /* Stats Grid */
    .stats {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
      margin-bottom: 24px;
    }

    .stat {
      background: rgba(255,255,255,0.06);
      border-radius: 16px;
      padding: 16px;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .stat-icon { font-size: 1.6rem; }
    .stat-label { color: #94a3b8; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.5px; }
    .stat-value { font-size: 1.1rem; font-weight: 600; margin-top: 2px; }

    /* Sun row */
    .sun-row {
      display: flex;
      justify-content: space-around;
      background: rgba(255,255,255,0.05);
      border-radius: 16px;
      padding: 16px;
    }

    .sun-item { text-align: center; }
    .sun-item .sun-icon { font-size: 1.8rem; }
    .sun-item .sun-label { color: #94a3b8; font-size: 0.75rem; margin: 4px 0; }
    .sun-item .sun-time { font-size: 1rem; font-weight: 600; }

    /* Loader */
    .loader {
      display: none;
      width: 40px;
      height: 40px;
      border: 4px solid rgba(255,255,255,0.1);
      border-top-color: #3b82f6;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 20px auto;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .api-note {
      margin-top: 24px;
      color: #64748b;
      font-size: 0.78rem;
      text-align: center;
      max-width: 500px;
    }

    .api-note a { color: #60a5fa; text-decoration: none; }
  </style>
</head>
<body>

  <h1>🌤️ Weather Dashboard</h1>
  <p class="subtitle">Get real-time weather for any city</p>

  <div class="search-bar">
    <input type="text" id="cityInput" placeholder="Enter city name..." />
    <button onclick="getWeather()">Search</button>
  </div>

  <div class="error" id="error"></div>
  <div class="loader" id="loader"></div>

  <div class="card" id="weatherCard">
    <div class="city-row">
      <div>
        <div class="city-name" id="cityName"></div>
        <div class="city-country" id="cityCountry"></div>
      </div>
      <div class="city-date" id="cityDate"></div>
    </div>

    <div class="temp-row">
      <div class="weather-icon" id="weatherIcon"></div>
      <div class="temperature" id="temperature"></div>
      <div class="temp-unit">°C</div>
    </div>

    <div class="description" id="description"></div>
    <div class="feels-like" id="feelsLike"></div>

    <div class="stats">
      <div class="stat">
        <div class="stat-icon">💧</div>
        <div>
          <div class="stat-label">Humidity</div>
          <div class="stat-value" id="humidity"></div>
        </div>
      </div>
      <div class="stat">
        <div class="stat-icon">🌬️</div>
        <div>
          <div class="stat-label">Wind Speed</div>
          <div class="stat-value" id="windSpeed"></div>
        </div>
      </div>
      <div class="stat">
        <div class="stat-icon">👁️</div>
        <div>
          <div class="stat-label">Visibility</div>
          <div class="stat-value" id="visibility"></div>
        </div>
      </div>
      <div class="stat">
        <div class="stat-icon">🔵</div>
        <div>
          <div class="stat-label">Pressure</div>
          <div class="stat-value" id="pressure"></div>
        </div>
      </div>
    </div>

    <div class="sun-row">
      <div class="sun-item">
        <div class="sun-icon">🌅</div>
        <div class="sun-label">Sunrise</div>
        <div class="sun-time" id="sunrise"></div>
      </div>
      <div class="sun-item">
        <div class="sun-icon">🌇</div>
        <div class="sun-label">Sunset</div>
        <div class="sun-time" id="sunset"></div>
      </div>
    </div>
  </div>

  <p class="api-note">
    ⚙️ Uses <a href="https://openweathermap.org/api" target="_blank">OpenWeatherMap API</a>.
    Replace <strong>YOUR_API_KEY</strong> in the script with your free key from
    <a href="https://openweathermap.org" target="_blank">openweathermap.org</a>
  </p>

  <script>
    const API_KEY = "YOUR_API_KEY"; // 🔑 Replace with your free API key

    const weatherIcons = {
      "clear sky": "☀️", "few clouds": "🌤️", "scattered clouds": "⛅",
      "broken clouds": "☁️", "overcast clouds": "☁️",
      "light rain": "🌦️", "moderate rain": "🌧️", "heavy intensity rain": "⛈️",
      "thunderstorm": "⛈️", "snow": "❄️", "mist": "🌫️",
      "fog": "🌫️", "haze": "🌫️", "drizzle": "🌦️",
    };

    function getIcon(description) {
      for (const [key, icon] of Object.entries(weatherIcons)) {
        if (description.toLowerCase().includes(key)) return icon;
      }
      return "🌡️";
    }

    function formatTime(unix, offset) {
      const date = new Date((unix + offset) * 1000);
      return date.toUTCString().slice(17, 22);
    }

    function formatDate() {
      return new Date().toLocaleDateString("en-IN", {
        weekday: "long", day: "numeric", month: "long", year: "numeric"
      });
    }

    function showError(msg) {
      const el = document.getElementById("error");
      el.textContent = "⚠️ " + msg;
      el.style.display = "block";
      document.getElementById("weatherCard").style.display = "none";
    }

    function hideError() {
      document.getElementById("error").style.display = "none";
    }

    async function getWeather() {
      const city = document.getElementById("cityInput").value.trim();
      if (!city) { showError("Please enter a city name."); return; }

      hideError();
      document.getElementById("loader").style.display = "block";
      document.getElementById("weatherCard").style.display = "none";

      try {
        const url = `https://api.openweathermap.org/data/2.5/weather?q=${encodeURIComponent(city)}&appid=${API_KEY}&units=metric`;
        const res  = await fetch(url);
        const data = await res.json();

        if (data.cod !== 200) {
          showError(data.message || "City not found.");
          return;
        }

        // Populate card
        document.getElementById("cityName").textContent    = data.name;
        document.getElementById("cityCountry").textContent = `${data.sys.country} · ${data.coord.lat.toFixed(2)}°N, ${data.coord.lon.toFixed(2)}°E`;
        document.getElementById("cityDate").textContent    = formatDate();
        document.getElementById("temperature").textContent = Math.round(data.main.temp);
        document.getElementById("description").textContent = data.weather[0].description;
        document.getElementById("feelsLike").textContent   = `Feels like ${Math.round(data.main.feels_like)}°C`;
        document.getElementById("weatherIcon").textContent = getIcon(data.weather[0].description);
        document.getElementById("humidity").textContent    = data.main.humidity + "%";
        document.getElementById("windSpeed").textContent   = (data.wind.speed * 3.6).toFixed(1) + " km/h";
        document.getElementById("visibility").textContent  = (data.visibility / 1000).toFixed(1) + " km";
        document.getElementById("pressure").textContent    = data.main.pressure + " hPa";
        document.getElementById("sunrise").textContent     = formatTime(data.sys.sunrise, data.timezone);
        document.getElementById("sunset").textContent      = formatTime(data.sys.sunset,  data.timezone);

        document.getElementById("weatherCard").style.display = "block";

      } catch (err) {
        showError("Network error. Please check your connection.");
      } finally {
        document.getElementById("loader").style.display = "none";
      }
    }

    // Allow Enter key to search
    document.getElementById("cityInput").addEventListener("keydown", e => {
      if (e.key === "Enter") getWeather();
    });
  </script>
</body>
</html>
